- name: Build ZMK
        uses: zmkfirmware/zmk-build-action@v3
        with:
          repository_path: zmk
          config_path: config
          install_modules: 'true'
          build_matrix_path: config/build.yaml
          # Use this variable to force ZMK to look at the downloaded duckyb files
          extra_cmake_args: -DZEPHYR_EXTRA_MODULES='${{ github.workspace }}/modules/zmk-urchin'
