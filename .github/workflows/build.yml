- name: Build ZMK
        uses: zmkfirmware/zmk-build-action@v3
        with:
          repository_path: zmk
          config_path: config
          install_modules: 'true'
          build_matrix_path: build.yaml
          # This line tells the compiler where the extra shields are:
          extra_cmake_args: -DZEPHYR_ZMK_URCHIN_MODULE_DIR='/__w/new-zmk-urchin/new-zmk-urchin/modules/zmk-urchin'
