steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Cache west modules
    uses: actions/cache@v4
    with:
      path: |
        modules
        zephyr
        bootloader
        zmk
      key: ${{ runner.os }}-build-${{ env.zephyr_version }}-${{ hashFiles('**/west.yml', '**/build.yaml') }}

  - name: West Init
    run: west init -l config

  - name: West Update
    run: west update
